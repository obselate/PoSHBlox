<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PoSHBlox — Drag, connect, run.</title>
<meta name="description" content="PoSHBlox — Visual PowerShell scripting. Drag, connect, run."/>
<link rel="canonical" href="https://poshblox.dev/"/>
<link rel="icon" href="/Assets/poshblox.ico" sizes="any"/>
<link rel="icon" type="image/png" href="/Assets/poshblox-icon.png"/>
<link rel="apple-touch-icon" href="/Assets/poshblox-icon.png"/>
<meta name="theme-color" content="#0B1929"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="PoSHBlox"/>
<meta property="og:title" content="PoSHBlox — Visual PowerShell scripting"/>
<meta property="og:description" content="Drag, connect, run. A visual node editor for PowerShell."/>
<meta property="og:url" content="https://poshblox.dev/"/>
<meta property="og:image" content="https://poshblox.dev/Assets/poshblox-og.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:image:alt" content="PoSHBlox — Visual PowerShell scripting"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="PoSHBlox — Visual PowerShell scripting"/>
<meta name="twitter:description" content="Drag, connect, run. A visual node editor for PowerShell."/>
<meta name="twitter:image" content="https://poshblox.dev/Assets/poshblox-og.png"/>
<meta name="twitter:image:alt" content="PoSHBlox — Visual PowerShell scripting"/>
<link rel="stylesheet" href="web/colors_and_type.css"/>
<style>
  /* ——— Page scaffolding ——— */
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    color: var(--fg);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* Canvas dot grid applied to the page background for continuity */
  .page-grid {
    position: fixed; inset: 0;
    background-color: var(--bg-canvas);
    background-image:
      radial-gradient(circle, var(--canvas-grid-major) 1px, transparent 1.5px),
      radial-gradient(circle, var(--canvas-grid-minor) 0.8px, transparent 1.2px);
    background-size: 150px 150px, 30px 30px;
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* Section padding */
  :root { --sec-pad-y: 120px; --sec-pad-x: 80px; --card-pad: 28px; }

  .page {
    width: 100%;
    margin: 0;
    padding: 0 64px;
    box-sizing: border-box;
  }

  /* ——— Top nav ——— */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: rgba(11, 25, 41, 0.65);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-inner {
    width: 100%;
    padding: 0 64px;
    height: 100%;
    display: flex; align-items: center; gap: 32px;
    box-sizing: border-box;
  }
  .nav-inner .nav-mark { margin-right: 16px; }
  .nav-inner .nav-cta { margin-left: auto; }
  .nav-mark { display: flex; align-items: center; gap: 12px; }
  .nav-mark-tile {
    width: 26px; height: 26px;
    background: url('/Assets/poshblox-icon.png') center/contain no-repeat;
  }
  .nav-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .nav-name .blox { color: var(--bright-400); }
  .nav-version {
    font-size: 10px; font-weight: 600;
    color: var(--moss-200);
    background: var(--moss-800);
    border: 1px solid var(--moss-600);
    padding: 2px 6px;
    border-radius: var(--radius-xs);
    margin-left: 4px;
    letter-spacing: 0.02em;
  }
  .nav-links { display: flex; gap: 28px; font-size: 12px; color: var(--fg-muted); }
  .nav-links a:hover { color: var(--fg); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 16px;
    background: var(--btn-run-bg); color: var(--teal-300);
    border: 1px solid var(--teal-700);
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600;
  }
  .nav-cta:hover { background: var(--btn-run-hover); color: var(--teal-200); }

  /* ——— Hero ——— */
  /* Hero uses full page width, not the centered .page container */
  .hero {
    width: 100%; max-width: none; margin: 0;
    padding: 72px 64px 40px;
    display: grid; grid-template-columns: minmax(360px, 1fr) minmax(520px, 1.6fr); gap: 56px;
    align-items: center;
    box-sizing: border-box;
  }
  @media (max-width: 980px) { .hero { grid-template-columns: 1fr; gap: 32px; padding-top: 40px; } }

  .hero-eyebrow {
    display: inline-block;
    font-size: 10px; letter-spacing: var(--ls-loose); text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 22px;
  }

  .hero h1 {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 700;
    line-height: 1.02;
    letter-spacing: -0.025em;
    margin: 0 0 18px;
  }
  .hero h1 .amb { color: var(--amber-400); }
  .hero h1 .tl  { color: var(--teal-400); }
  .hero h1 .bl  { color: var(--bright-400); }
  .hero h1 .sep { color: var(--slate-700); font-weight: 400; }

  .hero-sub {
    font-size: 15px; line-height: 1.55; color: var(--fg-muted);
    max-width: 52ch; margin: 0 0 28px;
  }
  .hero-sub code { color: var(--teal-300); }

  .hero-ctas { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 40px; padding: 0 16px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent;
    transition: none;
  }
  .btn-run {
    background: var(--btn-run-bg); color: var(--teal-200);
    border-color: var(--teal-700);
  }
  .btn-run:hover { background: var(--btn-run-hover); }
  .btn-ghost {
    background: transparent; color: var(--fg);
    border-color: var(--border-strong);
  }
  .btn-ghost:hover { background: var(--bg-secondary); }
  .btn-kbd {
    font-size: 10px; color: var(--fg-muted);
    border: 1px solid var(--border-strong);
    border-bottom-width: 2px;
    padding: 1px 5px; border-radius: 3px;
    background: #060D16;
  }

  .hero-stats {
    display: flex; gap: 24px; color: var(--fg-muted); font-size: 11px;
    padding-top: 18px; border-top: 1px solid var(--border);
  }
  .hero-stats b { color: var(--fg); font-weight: 700; }

  /* Hero visual container */
  .hero-visual {
    position: relative;
    min-height: 520px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background:
      radial-gradient(circle at 50% 50%, rgba(91,168,154,0.04), transparent 60%),
      var(--bg-canvas);
    box-shadow: var(--shadow-container), inset 0 0 0 1px rgba(255,255,255,0.02);
    overflow: hidden;
  }
  .hero-visual::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, var(--canvas-grid-major) 1px, transparent 1.5px),
      radial-gradient(circle, var(--canvas-grid-minor) 0.8px, transparent 1.2px);
    background-size: 150px 150px, 30px 30px;
    opacity: 0.8;
    pointer-events: none;
  }
  .hero-visual-chrome {
    position: absolute; top: 0; left: 0; right: 0;
    height: 30px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 0 0 10px;
    border-bottom: 1px solid var(--border);
    background: #080F1A;
    font-size: 10px; color: var(--fg-muted);
    letter-spacing: 0.04em;
    z-index: 3;
  }
  .hero-visual-chrome .hc-tile {
    width: 16px; height: 16px;
    background: url('/Assets/poshblox-icon.png') center/contain no-repeat;
  }
  .hero-visual-chrome .hc-title { color: var(--fg); font-weight: 600; }
  .hero-visual-chrome .hc-run {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--teal-300);
    background: var(--btn-run-bg);
    border: 1px solid var(--teal-700);
    padding: 2px 10px; border-radius: 3px;
    cursor: pointer;
  }
  .hero-visual-chrome .hc-run:hover { background: var(--btn-run-hover); }
  .hero-visual-chrome .hc-run.running { color: var(--amber-300); border-color: var(--amber-700); background: var(--amber-900); }
  .hero-visual-chrome .hc-script {
    display: inline-flex; align-items: center; gap: 6px;
    height: 20px; padding: 0 8px;
    margin-left: auto;
    background: transparent; color: var(--fg-muted);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: var(--ls-loose); text-transform: uppercase;
    cursor: pointer;
  }
  .hero-visual-chrome .hc-script:hover { color: var(--fg); border-color: var(--slate-500); background: #11202F; }
  .hero-visual-chrome .hc-script.on {
    color: #7FBFEF;
    border-color: #3A6A96;
    background: rgba(44, 90, 138, 0.25);
  }
  .hero-visual-chrome .hc-run { margin-left: 6px; }
  /* ——— Script panel (bottom of hero graph) ——— */
  .hero-script-panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 50;
    background: #0A1828;
    border-top: 1px solid var(--border);
    height: 0; overflow: hidden;
    transition: height 220ms ease;
    z-index: 3;
    font-family: var(--font-mono); font-size: 11px;
  }
  .hero-script-panel.open { height: 200px; }
  .hsp-head {
    display: flex; align-items: center; gap: 8px;
    height: 28px; padding: 0 14px;
    border-bottom: 1px solid var(--border);
    background: #0C1C2E;
    color: var(--fg-muted);
    font-size: 11px;
    letter-spacing: 0.02em;
  }
  .hsp-title { color: var(--fg); font-weight: 500; font-family: var(--font-mono); }
  .hsp-close {
    margin-left: auto;
    width: 20px; height: 20px;
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--fg-muted); border-radius: 3px;
    cursor: pointer; font-size: 10px; line-height: 1;
  }
  .hsp-close:hover { color: var(--fg); background: #11202F; }
  .hsp-code {
    margin: 0; padding: 14px 18px;
    color: #BFE9D9; font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
    white-space: pre;
    overflow: auto;
    height: calc(100% - 28px);
    box-sizing: border-box;
  }
  .hsp-code .ps-com  { color: #3D6E7C; }
  .hsp-code .ps-cm   { color: #4FD1B5; }
  .hsp-code .ps-var  { color: #4FD1B5; }
  .hsp-code .ps-flag { color: #4FD1B5; }
  .hsp-code .ps-str  { color: #BFE9D9; }
  .hsp-code .ps-num  { color: #BFE9D9; }
  .hsp-code .ps-op   { color: #BFE9D9; }
  .hsp-code .ps-prop { color: #BFE9D9; }
  /* Windows-style window controls: min / max / close */
  .hero-visual-chrome .win-ctrls { display: flex; height: 30px; margin-left: 6px; }
  .hero-visual-chrome .win-btn {
    width: 38px; height: 30px;
    background: transparent; border: 0;
    color: var(--fg-muted); cursor: pointer;
    display: grid; place-items: center;
  }
  .hero-visual-chrome .win-btn:hover { background: #11202F; color: var(--fg); }
  .hero-visual-chrome .win-close:hover { background: #D05050; color: #fff; }
  .hero-visual-chrome .win-btn svg { width: 10px; height: 10px; }

  /* ——— Sections ——— */
  section.panel {
    padding-top: var(--sec-pad-y);
    padding-bottom: 0;
  }
  .section-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: var(--ls-loose); text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 16px;
  }
  .section-label .tag-num {
    color: var(--teal-500);
  }
  .section-title {
    font-size: clamp(28px, 3.6vw, 40px);
    font-weight: 700; letter-spacing: -0.02em; line-height: 1.1;
    margin: 0 0 16px;
  }
  .section-lede {
    font-size: 14px; color: var(--fg-muted);
    max-width: 68ch; line-height: 1.55;
    margin: 0 0 40px;
  }

  /* What it is */
  .pitch-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 1px; background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  @media (max-width: 900px) { .pitch-grid { grid-template-columns: 1fr; } }
  .pitch-cell {
    background: var(--bg-surface);
    padding: var(--card-pad);
    min-height: 160px;
  }
  .pitch-cell h3 { margin: 0 0 8px; font-size: 14px; font-weight: 700; }
  .pitch-cell p  { margin: 0; font-size: 12px; color: var(--fg-muted); line-height: 1.55; }
  .pitch-cell .cell-tag {
    font-size: 10px; color: var(--fg-muted); letter-spacing: var(--ls-loose); text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .pitch-cell .cell-tag .dot { width: 8px; height: 8px; border-radius: 2px; }

  /* How it works */
  .steps {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  @media (max-width: 900px) { .steps { grid-template-columns: 1fr; } }
  .step {
    background: var(--bg-surface);
    padding: var(--card-pad);
    display: grid; grid-template-rows: auto auto 1fr;
    gap: 12px;
    min-height: 240px;
  }
  .step-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; color: var(--fg-muted); letter-spacing: var(--ls-loose); text-transform: uppercase;
  }
  .step-num {
    color: var(--teal-500); font-weight: 700;
  }
  .step h3 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .step p { margin: 0; font-size: 12px; color: var(--fg-muted); line-height: 1.55; }
  .step-vis {
    margin-top: 12px; height: 210px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-canvas);
    position: relative; overflow: hidden;
  }
  .step-vis > div { height: 100%; box-sizing: border-box; }

  /* Feature grid */
  .features {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  @media (max-width: 900px) { .features { grid-template-columns: 1fr; } }
  .feature {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--card-pad);
    display: grid; grid-template-rows: auto auto 1fr auto;
    gap: 10px;
    min-height: 180px;
  }
  .feature h4 { margin: 0; font-size: 13px; font-weight: 700; }
  .feature p  { margin: 0; font-size: 11px; color: var(--fg-muted); line-height: 1.55; }
  .feature-tag {
    font-size: 10px; color: var(--fg-muted);
    letter-spacing: var(--ls-loose); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .feature-tag .sq { width: 8px; height: 8px; border-radius: 2px; }
  .feature-foot {
    font-size: 10px; color: var(--slate-600);
    border-top: 1px solid var(--border);
    padding-top: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Footer */
  .foot {
    margin-top: 120px;
    border-top: 1px solid var(--border);
    background: var(--bg-primary);
    padding: 40px 0 24px;
    position: relative; z-index: 1;
  }
  .foot-inner {
    width: 100%; margin: 0; padding: 0 64px;
    display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 40px;
    box-sizing: border-box;
  }
  @media (max-width: 900px) { .foot-inner { grid-template-columns: 1fr 1fr; } }
  .foot-mark { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
  .foot-mark .blox { color: var(--bright-400); }
  .foot-desc { font-size: 11px; color: var(--fg-muted); line-height: 1.55; margin-top: 10px; max-width: 32ch; }
  .foot-col h5 {
    font-size: 10px; letter-spacing: var(--ls-loose); text-transform: uppercase;
    color: var(--fg-muted); margin: 0 0 14px; font-weight: 600;
  }
  .foot-col a {
    display: block; font-size: 12px; color: var(--fg);
    padding: 4px 0;
  }
  .foot-col a:hover { color: var(--teal-300); }
  .foot-bar {
    width: 100%; margin: 32px 0 0; padding: 20px 64px 0;
    border-top: 1px solid var(--border);
    display: flex; justify-content: center; align-items: center;
    font-size: 10px; color: var(--fg-muted);
    box-sizing: border-box;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-canvas); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--slate-700); }

  /* Tiny mini-node shared with HeroCanvas + step visuals */
  .mini-node {
    position: absolute;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-node);
    font-size: 11px; color: var(--fg);
    user-select: none;
  }
  .mini-node-head {
    height: 28px; padding: 0 12px;
    border-top-left-radius: var(--radius-md);
    border-top-right-radius: var(--radius-md);
    background: #3E6EA3;
    display: flex; align-items: center; justify-content: space-between;
    color: #fff; font-weight: 600; font-size: 11px;
    font-family: var(--font-mono);
    text-shadow: 0 1px 0 rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(0,0,0,0.35);
  }
  .mini-node-chev {
    font-size: 10px; opacity: 0.55; color: #fff;
    display: inline-block; line-height: 1;
  }
  .mini-node-flow {
    position: relative;
    height: 22px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .mini-flow-tri {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }
  .mini-flow-tri.in  { left: 10px; border-left: 9px solid #fff; }
  .mini-flow-tri.out { right: 10px; border-left: 9px solid #fff; }
  .mini-node-foot {
    padding: 6px 0 8px;
    text-align: center;
    font-size: 10px;
    color: var(--fg-tertiary);
    font-family: var(--font-mono);
  }
  .mini-node-body {
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 6px 0;
  }
  .mini-pin {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--fg-tertiary);
    padding: 3px 12px;
    min-height: 18px;
    position: relative;
  }
  .mini-pin.out { justify-content: flex-end; }
  .mini-pin-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2.5px solid var(--pin-any);
    background: #0C1A28;
    flex-shrink: 0;
    box-sizing: border-box;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  /* Center the pin circle directly on the node's edge: half overflows outside. */
  .mini-pin:not(.out) .mini-pin-dot { left: -6px; }
  .mini-pin.out .mini-pin-dot { right: -6px; }
  .mini-pin.out { flex-direction: row; }
  .mini-pin-dot.connected { background: currentColor; border-color: currentColor; }
</style>
</head>
<body>
<div class="page-grid"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="web/HeroCanvas.jsx"></script>
<script type="text/babel" src="web/StepVisuals.jsx"></script>
<script type="text/babel" src="web/App.jsx"></script>

</body>
</html>
