name: Deploy Pages

# Requires Pages source to be set to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'CNAME'
      - '.nojekyll'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'Assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
